<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Attendance by Ys</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
--primary:#1976d2;
--secondary:#1565c0;
--bg:#f4f6f9;
--card:#ffffff;
--danger:#e53935;
--success:#43a047;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:'Poppins',sans-serif;
background:var(--bg);
}

h2{
margin:0;
padding:15px;
background:var(--primary);
color:white;
text-align:center;
font-weight:500;
}

/* container */
.main{
max-width:700px;
margin:auto;
padding:15px;
}

/* textarea */
textarea{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
font-size:14px;
}

/* buttons */
button{
border:none;
border-radius:10px;
padding:10px 14px;
margin:5px 3px;
font-size:14px;
cursor:pointer;
background:var(--primary);
color:white;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
transition:0.2s;
}

button:hover{
background:var(--secondary);
}

button.secondary{
background:#607d8b;
}

button.danger{
background:var(--danger);
}

button.success{
background:var(--success);
}

/* toggle */
#count-toggle.off{
background:var(--danger);
}

/* student list */
.container{
margin-top:10px;
}

.student{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
margin:8px 0;
border-radius:12px;
background:var(--card);
box-shadow:0 2px 6px rgba(0,0,0,0.1);
font-weight:500;
transition:0.2s;
}

.student.present{
border-left:6px solid var(--success);
}

.student.absent{
border-left:6px solid var(--danger);
background:#fdecea;
}

.student span{
flex:1;
}

/* small buttons */
.edit-btn,.remove-btn{
padding:6px 10px;
font-size:12px;
margin-left:5px;
border-radius:8px;
}

.edit-btn{
background:#ffb300;
color:black;
}

.remove-btn{
background:var(--danger);
}

/* result */
#result{
margin-top:20px;
background:var(--card);
padding:15px;
border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* whatsapp */
#whatsapp-share{
display:none;
width:100%;
background:#25d366;
margin-top:10px;
}

</style>
</head>

<body>

<h2>Attendance by Ys</h2>

<div class="main">

<textarea id="new-student" placeholder="Enter student names (one per line)" rows="4"></textarea>

<div>
<button onclick="addStudent()">Add</button>
<button class="danger" onclick="deleteAllStudents()">Delete All</button>
<button class="secondary" onclick="resetAttendance()">Reset</button>
<button onclick="sortByName()">Sort A-Z</button>
<button onclick="sortByDate()">Sort Date</button>
</div>

<button id="count-toggle" onclick="toggleCount()">Send Count: ON</button>

<div class="container" id="students-list"></div>

<button class="success" onclick="submitAttendance()">Submit Attendance</button>

<div id="result"></div>

<button id="whatsapp-share" onclick="shareOnWhatsApp()">Share on WhatsApp</button>

</div>

<script>
(function(){
const key="attendance_unlocked";
if(!localStorage.getItem(key)){
let pass="";
while(pass!=="1234"){
pass=prompt("Enter password to access this file:");
if(pass===null)document.body.innerHTML="";
}
localStorage.setItem(key,"yes");
}
})();

let students=JSON.parse(localStorage.getItem("students"))||["Yashpal","Suthar"];
let attendance=JSON.parse(localStorage.getItem("attendance"))||{};
let studentAddDates=JSON.parse(localStorage.getItem("studentAddDates"))||{};

let sendCount=JSON.parse(localStorage.getItem("sendCount"));
if(sendCount===null)sendCount=true;

function updateToggleUI(){
const b=document.getElementById("count-toggle");
b.innerText=sendCount?"Send Count: ON":"Send Count: OFF";
b.classList.toggle("off",!sendCount);
}

function toggleCount(){
sendCount=!sendCount;
localStorage.setItem("sendCount",JSON.stringify(sendCount));
updateToggleUI();
}

function saveData(){
localStorage.setItem("students",JSON.stringify(students));
localStorage.setItem("attendance",JSON.stringify(attendance));
localStorage.setItem("studentAddDates",JSON.stringify(studentAddDates));
}

function createStudentList(){
const c=document.getElementById("students-list");
c.innerHTML="";
students.forEach((name,i)=>{
const d=document.createElement("div");
d.className="student "+(attendance[name]==="absent"?"absent":"present");
d.onclick=()=>toggleAttendance(name,d);

const s=document.createElement("span");
s.innerText=`${i+1}. ${name}`;

const e=document.createElement("button");
e.innerText="Edit";
e.className="edit-btn";
e.onclick=x=>{x.stopPropagation();editStudent(i);};

const r=document.createElement("button");
r.innerText="Remove";
r.className="remove-btn";
r.onclick=x=>{x.stopPropagation();removeStudent(i);};

d.appendChild(s);d.appendChild(e);d.appendChild(r);
c.appendChild(d);
if(!attendance[name])attendance[name]="present";
});
saveData();
}

function toggleAttendance(name,el){
attendance[name]=attendance[name]==="present"?"absent":"present";
el.classList.toggle("absent");
el.classList.toggle("present");
saveData();
}

function addStudent(){
const input=document.getElementById("new-student").value.trim();
if(!input)return alert("Please enter at least one name.");
const names=input.split("\n").map(n=>n.trim()).filter(n=>n&&!students.includes(n));
const now=new Date().toISOString();
students.push(...names);
names.forEach(n=>{attendance[n]="present";studentAddDates[n]=now;});
document.getElementById("new-student").value="";
createStudentList();
}

function editStudent(i){
const n=prompt("Edit student name:",students[i]);
if(n&&n.trim()){
attendance[n]=attendance[students[i]];
delete attendance[students[i]];
students[i]=n.trim();
createStudentList();
}
}

function removeStudent(i){
if(confirm(`Are you sure you want to remove ${students[i]}?`)){
delete attendance[students[i]];
delete studentAddDates[students[i]];
students.splice(i,1);
createStudentList();
}
}

function resetAttendance(){
students.forEach(n=>attendance[n]="present");
createStudentList();
}

function deleteAllStudents(){
if(confirm("Are you sure you want to delete all students?")){
students=[];attendance={};studentAddDates={};
createStudentList();
}
}

function sortByName(){students.sort();createStudentList();}
function sortByDate(){students.sort((a,b)=>new Date(studentAddDates[a])-new Date(studentAddDates[b]));createStudentList();}

function submitAttendance(){
const absentStudents=students.filter(n=>attendance[n]==="absent");
const total=students.length;
const absent=absentStudents.length;
const present=total-absent;

const list=absentStudents.length
?absentStudents.map((n,i)=>`<li>${i+1}. ${n}</li>`).join("")
:"<li>None</li>";

document.getElementById("result").innerHTML=
`<p><b>📌 Today's Attendance</b></p>
<p><b>📍 Absent Students</b></p>
<ul>${list}</ul>
<p><b>Present Students:</b> ${present}</p>
<p><b>Absent Students:</b> ${absent}</p>
<p><b>Total Students:</b> ${total}</p>`;

document.getElementById("whatsapp-share").style.display="block";
}

function shareOnWhatsApp(){
const absentStudents=students.filter(n=>attendance[n]==="absent");
const total=students.length;
const absent=absentStudents.length;
const present=total-absent;
const date=new Date().toLocaleDateString("en-GB");

const absentText=absentStudents.length
?absentStudents.map((n,i)=>`${i+1}. ${n}`).join("\n")
:"None";

let msg=
`📌 *Today's Attendance (${date})*\n\n`+
`📍 *Absent Students:*\n${absentText}`;

if(sendCount){
msg+=`\n\nPresent Students: ${present}\nAbsent Students: ${absent}\nTotal Students: ${total}`;
}

window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`,"_blank");
}

updateToggleUI();
createStudentList();
</script>

</body>
</html>
